# All channels use outbound connections — no public IP required.

# channels:
#   langgraph_url: http://localhost:2024   # GoClaw agent server
#   gateway_url: http://localhost:8001     # GoClaw gateway API
#
#   session:
#     assistant_id: lead_agent
